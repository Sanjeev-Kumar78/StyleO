services:
  redis:
    image: redis:latest
    container_name: styleo-redis
    ports:
      - "6379:6379"
    env_file:
      - backend/.env
    command: >
      sh -c 'if [ -n "$$REDIS_PASSWORD" ]; then
               exec redis-server --appendonly no --requirepass "$$REDIS_PASSWORD"
             else
               exec redis-server --appendonly no
             fi'
    volumes:
      - redis_data:/data
    networks:
      - styleo-net
  redis-insight:
    image: redis/redisinsight:latest
    container_name: styleo-redis-insight
    ports:
      - "5540:5540"
    env_file:
      - backend/.env
    depends_on:
      - redis
    volumes:
      - redis_insight_data:/data
    networks:
      - styleo-net

volumes:
  redis_data:
  redis_insight_data:

networks:
  styleo-net:
    driver: bridge
