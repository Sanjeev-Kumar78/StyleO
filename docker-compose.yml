  nginx:
    image: nginx:latest
    container_name: styleo-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - backend
      - frontend
    networks:
      - styleo-net
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: styleo-backend
    # Backend only accessible via nginx (internal network)
    env_file:
      - backend/.env
    command: >
      uv run uvicorn main:app --host 0.0.0.0 --port 8080
    depends_on:
      - redis
    networks:
      - styleo-net
    restart: unless-stopped

  worker:
    build: ./backend
    container_name: styleo-worker
    env_file:
      - backend/.env
    command: >
      uv sync && uv run taskiq worker workers.main:broker
    depends_on:
      - redis
    networks:
      - styleo-net
    restart: unless-stopped

