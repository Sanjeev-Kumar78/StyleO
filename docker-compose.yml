services:
  backend:
    build: ./backend
    container_name: styleo-backend
    ports:
      - "80:8080"
    env_file:
      - backend/.env
    command: >
      uv run uvicorn main:app --host 0.0.0.0 --port 8080
    depends_on:
      - redis
    networks:
      - styleo-net

  worker:
    build: ./backend
    container_name: styleo-worker
    env_file:
      - backend/.env
    command: >
      uv run taskiq worker worker.main:broker
    depends_on:
      - redis
    networks:
      - styleo-net

  redis:
    image: redis:latest
    container_name: styleo-redis
    ports:
      - "6379:6379"
    env_file:
      - backend/.env
    command: >
      sh -c 'if [ -n "$$REDIS_PASSWORD" ]; then
               exec redis-server --appendonly no --requirepass "$$REDIS_PASSWORD"
             else
               exec redis-server --appendonly no
             fi'
    volumes:
      - redis_data:/data
    networks:
      - styleo-net

  redis-insight:
    image: redis/redisinsight:latest
    container_name: styleo-redis-insight
    ports:
      - "5540:5540"
    depends_on:
      - redis
    volumes:
      - redis_insight_data:/data
    networks:
      - styleo-net

volumes:
  redis_data:
  redis_insight_data:

networks:
  styleo-net:
    driver: bridge
