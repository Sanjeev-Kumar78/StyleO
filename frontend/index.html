<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon_StyleO.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StyleO — Wardrobe Management</title>
    <!-- Fonts: Cormorant Garamond (display) + Space Grotesk (body/UI) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Space+Grotesk:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <!-- Prevent flash of wrong theme -->
    <script>
      (function () {
        var t = localStorage.getItem("theme");
        if (t === "light") {
          document.documentElement.classList.remove("dark");
          document.documentElement.style.colorScheme = "light";
        } else {
          document.documentElement.classList.add("dark");
          document.documentElement.style.colorScheme = "dark";
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
